<h2>Admin Flight Panel</h2>



<h3>{{ editMode ? 'Edit Flight' : 'Add Flight' }}</h3>

<input [(ngModel)]="newFlight.airline" placeholder="Airline" />
<input [(ngModel)]="newFlight.departure" placeholder="Departure" />
<input [(ngModel)]="newFlight.destination" placeholder="Destination" />
<input [(ngModel)]="newFlight.departureTime" placeholder="Departure Time" />
<input [(ngModel)]="newFlight.arrivalTime" placeholder="Arrival Time" />
<input type="number" [(ngModel)]="newFlight.price" placeholder="Price" />


<div class="button-group">
  <button (click)="loadFlights()">Load All Flights (double-click)</button>
  <button (click)="submit()">
    {{ editMode ? 'Update Flight' : 'Add Flight (double-click)' }}
  </button>

  <div class="top-bar">
    <button class="back-btn" routerLink="/login">⬅ Exit</button>
  </div>
</div>

<hr />

<h2>All Available Flights</h2>
<div *ngFor="let f of flights" class="flight-card">

  <p>
    {{ f.airline }} - {{ f.departure }} → {{ f.destination }} - ${{ f.price }}
  </p>

  <button (click)="editFlight(f)">Edit</button>
  <button class="delete-btn" (click)="deleteFlight(f.id)">Delete</button>
</div>
